<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>五子棋小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            font-family: "微软雅黑";
        }
        h2 {
            color: #333;
            margin-bottom: 16px;
        }
        .btn-box {
            margin-bottom: 12px;
        }
        button {
            padding: 7px 16px;
            font-size: 15px;
            border: none;
            border-radius: 4px;
            background: #2b7cd3;
            color: #fff;
            cursor: pointer;
            margin: 0 8px;
        }
        button:hover {
            background: #1e62aa;
        }
        #info {
            font-size: 17px;
            margin-bottom: 10px;
        }
        canvas {
            border: 3px solid #603813;
            background: #deb887;
        }
    </style>
</head>
<body>
    <h2>五子棋</h2>
    <div class="btn-box">
        <button onclick="resetGame()">重新开局</button>
        <button onclick="undo()">悔棋</button>
    </div>
    <div id="info">黑方先行</div>
    <canvas id="chessCanvas" width="640" height="640"></canvas>

    <script>
        // 基础配置
        const size = 15;
        const grid = 40;
        const padding = 20;
        const canvas = document.getElementById("chessCanvas");
        const ctx = canvas.getContext("2d");
        const infoText = document.getElementById("info");

        // 棋盘状态：0空 1黑棋 2白棋
        let board = Array(size).fill().map(() => Array(size).fill(0));
        let isBlack = true;
        let history = []; // 记录落子历史用于悔棋
        let gameEnd = false;

        // 绘制棋盘线条与星位点
        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // 横竖线
            for (let i = 0; i < size; i++) {
                ctx.beginPath();
                ctx.moveTo(padding, padding + i * grid);
                ctx.lineTo(padding + grid * 14, padding + i * grid);
                ctx.strokeStyle = "#503010";
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(padding + i * grid, padding);
                ctx.lineTo(padding + i * grid, padding + grid * 14);
                ctx.stroke();
            }
            // 星位坐标
            const starPos = [3, 7, 11];
            starPos.forEach(x => {
                starPos.forEach(y => {
                    drawStar(x, y);
                })
            })
            // 绘制所有棋子
            for (let x = 0; x < size; x++) {
                for (let y = 0; y < size; y++) {
                    if (board[x][y] !== 0) {
                        drawChess(x, y, board[x][y]);
                    }
                }
            }
        }

        // 画星点
        function drawStar(x, y) {
            ctx.beginPath();
            ctx.arc(padding + x * grid, padding + y * grid, 5, 0, Math.PI * 2);
            ctx.fillStyle = "#442810";
            ctx.fill();
        }

        // 绘制棋子
        function drawChess(x, y, type) {
            const cx = padding + x * grid;
            const cy = padding + y * grid;
            const r = grid / 2 - 3;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            if (type === 1) {
                const grad = ctx.createRadialGradient(cx - 10, cy - 10, 0, cx, cy, r);
                grad.addColorStop(0, "#666");
                grad.addColorStop(1, "#000");
                ctx.fillStyle = grad;
            } else {
                const grad = ctx.createRadialGradient(cx - 10, cy - 10, 0, cx, cy, r);
                grad.addColorStop(0, "#fff");
                grad.addColorStop(1, "#ccc");
                ctx.fillStyle = grad;
            }
            ctx.fill();
            ctx.strokeStyle = "#333";
            ctx.stroke();
        }

        // 点击落子
        canvas.addEventListener("click", e => {
            if (gameEnd) return;
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            let x = Math.round((mx - padding) / grid);
            let y = Math.round((my - padding) / grid);
            // 边界判断
            if (x < 0 || x >= size || y < 0 || y >= size) return;
            if (board[x][y] !== 0) return;

            const current = isBlack ? 1 : 2;
            board[x][y] = current;
            history.push({ x, y });
            drawBoard();

            // 判断胜利
            if (checkWin(x, y, current)) {
                gameEnd = true;
                infoText.innerText = current === 1 ? "黑棋胜利！游戏结束" : "白棋胜利！游戏结束";
                return;
            }
            // 切换棋手
            isBlack = !isBlack;
            infoText.innerText = isBlack ? "轮到黑棋" : "轮到白棋";
        })

        // 五子连线判断
        function checkWin(x, y, chess) {
            // 四个方向：横、竖、左斜、右斜
            const dir = [[1, 0], [0, 1], [1, 1], [1, -1]];
            for (let [dx, dy] of dir) {
                let count = 1;
                // 正向统计
                let nx = x + dx, ny = y + dy;
                while (nx >= 0 && nx < size && ny >= 0 && ny < size && board[nx][ny] === chess) {
                    count++;
                    nx += dx;
                    ny += dy;
                }
                // 反向统计
                nx = x - dx;
                ny = y - dy;
                while (nx >= 0 && nx < size && ny >= 0 && ny < size && board[nx][ny] === chess) {
                    count++;
                    nx -= dx;
                    ny -= dy;
                }
                if (count >= 5) return true;
            }
            return false;
        }

        // 重置游戏
        function resetGame() {
            board = Array(size).fill().map(() => Array(size).fill(0));
            history = [];
            isBlack = true;
            gameEnd = false;
            infoText.innerText = "黑方先行";
            drawBoard();
        }

        // 悔棋功能
        function undo() {
            if (gameEnd || history.length === 0) return;
            const last = history.pop();
            board[last.x][last.y] = 0;
            isBlack = !isBlack;
            infoText.innerText = isBlack ? "轮到黑棋" : "轮到白棋";
            drawBoard();
        }

        // 初始化渲染棋盘
        drawBoard();
    </script>
</body>
</html>
